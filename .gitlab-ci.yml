default:
  image: node:24-slim
  interruptible: true

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.cache/npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .cache/npm
    - node_modules/
    - rules/node_modules/
    - core/node_modules/
    - minecraft/node_modules/
    - installer/node_modules/

stages:
  - install
  - build
  - publish

# ── install ────────────────────────────────────────────────────────────────────

install:
  stage: install
  script:
    - npm ci
  artifacts:
    expire_in: 1h
    paths:
      - node_modules/
      - rules/node_modules/
      - core/node_modules/
      - minecraft/node_modules/
      - installer/node_modules/

# ── build ──────────────────────────────────────────────────────────────────────

build:
  stage: build
  needs: [install]
  script:
    - npm run build --workspaces --if-present
  artifacts:
    expire_in: 1h
    paths:
      - rules/dist/
      - core/dist/
      - minecraft/dist/
      - mc/dist/
      - forge/dist/
      - installer/dist/
      - cli/dist/

# ── publish ────────────────────────────────────────────────────────────────────

publish:
  stage: publish
  needs: [build]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  script:
    # Auth: use CI_JOB_TOKEN for the GitLab package registry
    - |
      echo "@unifest:registry=https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/" >> .npmrc
      echo "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    # Stamp exact version in every non-private workspace package.json,
    # including cross-workspace @unifest/* dependencies
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      for dir in rules core minecraft mc forge installer; do
        npm pkg set "version=${VERSION}" --prefix "$dir"
        for dep in $(npm pkg get dependencies --prefix "$dir" 2>/dev/null | grep -o '"@unifest/[^"]*"' | tr -d '"'); do
          npm pkg set "dependencies.${dep}=${VERSION}" --prefix "$dir"
        done
      done
    # Publish all non-private workspaces
    - npm publish --workspaces
