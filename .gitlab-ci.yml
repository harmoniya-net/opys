default:
  image: node:24-slim
  interruptible: true

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.cache/npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .cache/npm
    - node_modules/
    - rules/node_modules/
    - core/node_modules/
    - minecraft/node_modules/
    - installer/node_modules/

stages:
  - install
  - build

# ── install ────────────────────────────────────────────────────────────────────

install:
  stage: install
  script:
    - npm ci
  artifacts:
    expire_in: 1h
    paths:
      - node_modules/
      - rules/node_modules/
      - core/node_modules/
      - minecraft/node_modules/
      - installer/node_modules/

# ── build ──────────────────────────────────────────────────────────────────────

build:
  stage: build
  needs: [install]
  script:
    - npm run build --workspaces --if-present
  artifacts:
    expire_in: 1h
    paths:
      - rules/dist/
      - core/dist/
      - minecraft/dist/
      - mc/dist/
      - forge/dist/
      - installer/dist/
      - cli/dist/
