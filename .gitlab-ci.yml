default:
  image: node:24-slim
  interruptible: true

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.cache/npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .cache/npm
    - node_modules/

stages:
  - install
  - build
  - test

# ── install ────────────────────────────────────────────────────────────────────

install:
  stage: install
  script:
    - npm ci
  artifacts:
    expire_in: 1h
    paths:
      - node_modules/

# ── build ──────────────────────────────────────────────────────────────────────

build:
  stage: build
  needs: [install]
  script:
    - npm run build --workspaces --if-present
  artifacts:
    expire_in: 1h
    paths:
      - "*/dist/"

typecheck:
  stage: build
  needs: [install]
  script:
    - npm run typecheck --workspaces --if-present

# ── test ───────────────────────────────────────────────────────────────────────
#
# Only unit tests run in CI. Integration tests (`npm run test:int`) need
# network access and a CurseForge token — they are run locally.

test:
  stage: test
  needs: [install, build]
  script:
    - npm run test --workspaces --if-present
