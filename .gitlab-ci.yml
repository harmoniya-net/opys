default:
  image: node:24-slim
  interruptible: true

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.cache/npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .cache/npm
    - node_modules/
    - rules/node_modules/
    - core/node_modules/
    - minecraft/node_modules/
    - installer/node_modules/

stages:
  - install
  - build
  - test
  - publish

# ── install ────────────────────────────────────────────────────────────────────

install:
  stage: install
  script:
    - npm ci --omit=optional
  artifacts:
    expire_in: 1h
    paths:
      - node_modules/
      - rules/node_modules/
      - core/node_modules/
      - minecraft/node_modules/
      - installer/node_modules/

# ── build ──────────────────────────────────────────────────────────────────────

build:
  stage: build
  needs: [install]
  script:
    - npm run build --workspaces --if-present
  artifacts:
    expire_in: 1h
    paths:
      - rules/dist/
      - core/dist/
      - minecraft/dist/
      - mc/dist/
      - forge/dist/
      - installer/dist/
      - cli/dist/

# ── test ───────────────────────────────────────────────────────────────────────

test:unit:
  stage: test
  needs: [build]
  script:
    - npm run test --workspaces --if-present

test:integration:
  stage: test
  needs: [build]
  when: manual
  allow_failure: false
  script:
    - npm run test:int --workspaces --if-present

# ── publish ────────────────────────────────────────────────────────────────────

publish:
  stage: publish
  needs: [build, test:unit]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  script:
    - |
      # Point npm at the GitLab registry for @unifest scope
      echo "@unifest:registry=https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/" >> .npmrc
      echo "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - |
      # Stamp version from tag (strip leading 'v')
      VERSION="${CI_COMMIT_TAG#v}"
      npm version "$VERSION" --workspaces --include-workspace-root --no-git-tag-version
    - npm publish --workspaces --access public
