name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo:
    name: Cargo build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-linux
      - run: cargo build --workspace --locked
      - run: cargo test --workspace --locked

  # The sweep/extract path handling branches on `\` vs `/` and case-folds on
  # Windows; only a real Windows filesystem walk exercises that end to end.
  cargo-windows:
    name: Cargo test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-windows
      - run: cargo test -p opys-runtime --locked

  node:
    name: TS build + typecheck + test
    runs-on: ubuntu-latest
    needs: cargo
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: node-napi
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Build the napi `.node` for the host (linux-x64-gnu) so the TS
      # packages can `require` it during typecheck and test.
      - run: npm run build --workspace=@opys/core-binding --workspace=@opys/runtime-binding
      - run: npm run build --workspaces --if-present
      - run: npm run typecheck
      - run: npm test
